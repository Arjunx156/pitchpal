# Quality gates for every push and PR. The e2e job runs against the dev
# server's built-in mock /api/chat, so no Gemini key is needed in CI.
name: CI

on:
  push:
    branches: [main, 'redesign/**']
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Typecheck · lint · format · coverage · build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run format:check
      # Enforces the coverage thresholds in vite.config.ts (95/85/82/95).
      - run: npm run coverage
      - run: npm run build

  e2e:
    name: Playwright e2e
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-artifacts
          path: test-results/
          retention-days: 7
